name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Compile application files
        run: python -m compileall .

      - name: Run tests
        run: |
          if find . -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            pytest --tb=short
          else
            echo "No test files found. Skipping pytest."
          fi
        continue-on-error: false

  docker:
    name: Docker build (PR validation)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bookcrawler-backend .

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [ci]
    # This environment link ensures GitHub uses the secrets from your screenshot
    environment: .env 
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and tag Docker image
        run: |
          docker build -t bookcrawler-backend:${{ github.sha }} .
          docker tag bookcrawler-backend:${{ github.sha }} bookcrawler-backend:latest

      - name: Save Docker image
        run: docker save bookcrawler-backend:latest | gzip > image.tar.gz

      - name: Copy image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "image.tar.gz"
          target: "/tmp" # Use /tmp for safer transfer

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Ensure the directory exists
            sudo mkdir -p /app/server
            sudo mv /tmp/image.tar.gz /app/server/image.tar.gz
            cd /app/server
            
            # Load and restart container
            gunzip -c image.tar.gz | docker load
            docker stop bookcrawler-backend || true
            docker rm bookcrawler-backend || true
            
            # Run the new container
            docker run -d \
              --name bookcrawler-backend \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file /app/.env \
              bookcrawler-backend:latest
            
            # Cleanup
            rm -f image.tar.gz
            docker image prune -f
            echo "✅ Deployment successful"