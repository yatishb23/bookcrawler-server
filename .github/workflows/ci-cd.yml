name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt pytest ruff
      - name: Lint
        run: ruff check .
      - name: Run tests
        run: |
          if find . -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            pytest --tb=short
          else
            echo "No tests found."
          fi

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Match the environment name from your screenshot exactly
    environment: secrets 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and Save Docker image
        run: |
          docker build -t bookcrawler-backend:latest .
          docker save bookcrawler-backend:latest | gzip > image.tar.gz

      - name: Copy image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          source: "image.tar.gz"
          target: "/tmp"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            sudo mkdir -p /app/server
            sudo mv /tmp/image.tar.gz /app/server/image.tar.gz
            cd /app/server
            
            # Load the new image
            gunzip -c image.tar.gz | docker load
            
            # Stop existing container
            docker stop bookcrawler-backend || true
            docker rm bookcrawler-backend || true
            
            # Start the new container
            docker run -d \
              --name bookcrawler-backend \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file /app/.env \
              bookcrawler-backend:latest
            
            # Cleanup
            rm -f image.tar.gz
            docker image prune -f
            echo "✅ Deployment successful"